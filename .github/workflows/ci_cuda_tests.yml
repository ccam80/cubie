name: CUDA tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1,3,5"   # Mon/Wed/Fri 16:00 UTC
  push:
    branches: ["main"]
  # PRs opt in via a maintainer comment (see the job `if`) rather than
  # running the paid GPU matrix on every PR.
  issue_comment:
    types: [created]

# Cancel superseded runs on the same PR/ref to avoid paying for stale jobs.
concurrency:
  group: cuda-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  cuda:
    # Real-GPU runs on paid AWS runners. Trigger on schedule/dispatch, on a
    # push whose commit message opts in, or when a maintainer comments
    # `/test on cuda` on a PR. The author_association gate stops external
    # commenters from spending GPU budget.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.issue.state == 'open' &&
       contains(github.event.comment.body, '/test on cuda') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      contains(github.event.head_commit.message, 'test_cuda') ||
      contains(github.event.head_commit.message, 'test_all')
    permissions:
      contents: read
    # max-parallel: 1 because one g4dn.2xlarge = 8 vCPU = the whole
    # On-Demand G quota. Calibrated against the last Lightning run,
    # a grouped 8-worker job is ~13 min and the serial 8-job matrix
    # ~106 min at ~$2/matrix — cost-neutral with 2 x g4dn.xlarge but
    # with the fastest per-job feedback. The param-set xdist grouping
    # (tests/conftest.py + --dist=loadgroup in addopts) keeps thread
    # scaling near-linear, so the 8 vCPUs are fully used. Raise
    # max-parallel only with a quota bump (each +1 needs +8 vCPU of
    # G quota).
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [linux, windows]
        python-version: ["3.10", "3.14"]
        cuda: ["12", "13"]
        include:
          - cuda: "12"
            extra: dev12
          - cuda: "13"
            extra: dev13
          - os: linux
            runner: gpu-linux
          - os: windows
            runner: gpu-windows
    runs-on: "runs-on=${{ github.run_id }}/runner=${{ matrix.runner }}"

    steps:
      # For comment-triggered runs the event ref is the default branch, so
      # check out the PR's merge ref explicitly; otherwise the pushed/ref SHA.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || github.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: GPU sanity check
        run: nvidia-smi

      - name: Install cubie (${{ matrix.extra }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[${{ matrix.extra }}]"

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        # -n logical (CLI) overrides pyproject's desktop-safe -n8 so the
        # runner uses all its vCPUs; change the runner instance size freely
        # and this scales automatically. Coverage/XML report come from addopts.
        run: pytest -m "not specific_algos and not sim_only" -n logical --junitxml=pytest-results.xml

      - name: Upload pytest artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: |
            pytest-results.xml
            coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false

      # test-results-action is node20-locked and deprecated; folded into
      # codecov-action via report_type. Kept a separate step because
      # report_type is single-valued (coverage vs test_results).
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: pytest-results.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false
