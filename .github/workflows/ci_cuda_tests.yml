name: CUDA tests
on:
  workflow_dispatch:
    inputs:
      attempt:
        description: "Retry counter (internal; leave as 1 for manual runs)."
        default: "1"
      legs:
        description: >
          JSON array of matrix legs to run (internal; empty = full matrix).
        default: ""
  schedule:
    - cron: "0 16 * * 1,3,5"   # Mon/Wed/Fri 16:00 UTC
  push:
    branches: ["main"]
  # PRs opt in via a maintainer comment (see the `setup` job `if`) rather
  # than running the paid GPU matrix on every PR.
  issue_comment:
    types: [created]

# Cancel superseded runs on the same PR/ref to avoid paying for stale jobs.
concurrency:
  group: cuda-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the matrix once so the retry path can re-run a subset of legs.
  # A fresh workflow_dispatch (attempt=1, legs="") runs the full 8-leg
  # matrix; a retry dispatch passes only the legs that never got a GPU.
  setup:
    # Real-GPU runs on paid AWS runners. Trigger on schedule/dispatch, on a
    # push whose commit message opts in, or when a maintainer comments
    # `/test on cuda` on a PR. The author_association gate stops external
    # commenters from spending GPU budget.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.issue.state == 'open' &&
       contains(github.event.comment.body, '/test on cuda') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      contains(github.event.head_commit.message, 'test_cuda') ||
      contains(github.event.head_commit.message, 'test_all')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      attempt: ${{ steps.gen.outputs.attempt }}
    steps:
      - name: Resolve matrix and attempt
        id: gen
        env:
          IN_LEGS: ${{ inputs.legs }}
          IN_ATTEMPT: ${{ inputs.attempt }}
        run: |
          set -euo pipefail
          if [ -n "${IN_LEGS:-}" ]; then
            MATRIX="$IN_LEGS"
          else
            MATRIX='[
              {"os":"linux","python-version":"3.10","cuda":"12","extra":"dev12","runner":"gpu-linux"},
              {"os":"linux","python-version":"3.10","cuda":"13","extra":"dev13","runner":"gpu-linux"},
              {"os":"linux","python-version":"3.14","cuda":"12","extra":"dev12","runner":"gpu-linux"},
              {"os":"linux","python-version":"3.14","cuda":"13","extra":"dev13","runner":"gpu-linux"},
              {"os":"windows","python-version":"3.10","cuda":"12","extra":"dev12","runner":"gpu-windows"},
              {"os":"windows","python-version":"3.10","cuda":"13","extra":"dev13","runner":"gpu-windows"},
              {"os":"windows","python-version":"3.14","cuda":"12","extra":"dev12","runner":"gpu-windows"},
              {"os":"windows","python-version":"3.14","cuda":"13","extra":"dev13","runner":"gpu-windows"}
            ]'
          fi
          MATRIX=$(printf '%s' "$MATRIX" | jq -c '.')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "attempt=${IN_ATTEMPT:-1}" >> "$GITHUB_OUTPUT"

  cuda:
    needs: setup
    name: cuda (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.cuda }})
    permissions:
      contents: read
    # max-parallel: 1 runs one 4-vCPU GPU instance at a time. Runners are
    # spot-only (ap-southeast-2 has zero On-Demand G/VT quota, not grantable
    # here) and the "All G and VT Spot" quota is a fixed 8 vCPU. A 4-vCPU
    # (xlarge) runner leaves 8-4=4 vCPU of headroom, so a leg's spot request
    # no longer collides with the previous, still-terminating leg's instance
    # -- that collision tripped RunsOn's fixed 5-min on-demand snooze, and
    # on-demand is 0, so the leg failed. GitHub/RunsOn expose no lever to
    # space serial jobs, so right-sizing is the fix. The `retry` job still
    # re-dispatches any leg that misses a spot GPU. The param-set xdist
    # grouping (tests/conftest.py + --dist=loadgroup in addopts) keeps
    # thread scaling near-linear across the 4 workers.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: "runs-on=${{ github.run_id }}/runner=${{ matrix.runner }}"

    steps:
      # For comment-triggered runs the event ref is the default branch, so
      # check out the PR's merge ref explicitly; otherwise the pushed/ref SHA.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || github.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: GPU sanity check
        run: nvidia-smi

      # A leg that reaches here got a real GPU, so any later failure is a
      # genuine test failure, not a spot-provisioning miss. The `retry` job
      # re-runs only legs WITHOUT this marker, so real failures stay red
      # and are never wastefully re-run on the GPU.
      - name: Mark GPU acquired
        if: success()
        run: echo ok > gpu-marker.txt
      - name: Upload GPU marker
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: gpu-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: gpu-marker.txt

      - name: Install cubie (${{ matrix.extra }})
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[${{ matrix.extra }}]"

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        # -n logical (CLI) overrides pyproject's desktop-safe -n8 so the
        # runner uses all its vCPUs; change the runner instance size freely
        # and this scales automatically. Coverage/XML report come from addopts.
        run: pytest -m "not specific_algos and not sim_only" -n logical --junitxml=pytest-results.xml

      - name: Upload pytest artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: |
            pytest-results.xml
            coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false

      # test-results-action is node20-locked and deprecated; folded into
      # codecov-action via report_type. Kept a separate step because
      # report_type is single-valued (coverage vs test_results).
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          report_type: test_results
          files: pytest-results.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false

  # Re-dispatch legs that never got a spot GPU, at a fixed interval. With
  # the runners right-sized (runs-on.yml) the quota-collision that tripped
  # RunsOn's 5-min on-demand snooze is gone, so this is now a thin safety
  # net for genuine transient capacity misses -- which appear in brief
  # windows, so a fixed short interval catches them better than an ever-
  # growing backoff (the same reasoning as the AMI-bake retry). Each retry
  # is a fresh run (attempt resets on the runner, so RunsOn tries spot
  # again rather than on-demand).
  retry:
    needs: [setup, cuda]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Download GPU markers
        # Do not fail the retry when zero legs got a GPU (no markers to
        # download) -- that total-failure case is exactly when we must
        # still re-dispatch. The compute step treats "no markers" as
        # "every leg is retryable".
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: gpu-*
          path: markers
      - name: Re-dispatch legs that never got a GPU
        env:
          MATRIX: ${{ needs.setup.outputs.matrix }}
          ATTEMPT: ${{ needs.setup.outputs.attempt }}
          MAX_ATTEMPTS: "5"
          RETRY_INTERVAL: "180"   # seconds; fixed (capacity returns in brief windows)
          REF: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Markers are artifacts named gpu-<os>-py<pyver>-cuda<cuda>; a leg
          # with a marker acquired a GPU and is not a provisioning failure.
          if [ -d markers ]; then
            ls markers | sed -n 's/^gpu-//p' | sort -u > acquired.txt
          else
            : > acquired.txt
          fi
          RETRYABLE=$(printf '%s' "$MATRIX" | jq -c --rawfile s acquired.txt '
            ($s | split("\n") | map(select(length > 0))) as $ok
            | map(select(
                (.os + "-py" + (."python-version") + "-cuda" + .cuda) as $k
                | ($ok | index($k)) == null))')
          COUNT=$(printf '%s' "$RETRYABLE" | jq 'length')
          echo "Attempt ${ATTEMPT}: ${COUNT} leg(s) never acquired a GPU."
          if [ "$COUNT" -eq 0 ]; then
            echo "No spot-provisioning failures to retry."
            exit 0
          fi
          if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
            echo "Reached MAX_ATTEMPTS=${MAX_ATTEMPTS}; leaving the run red."
            exit 0
          fi
          echo "Retrying these legs in ${RETRY_INTERVAL}s:"
          printf '%s' "$RETRYABLE" | jq .
          sleep "$RETRY_INTERVAL"
          gh workflow run ci_cuda_tests.yml \
            --ref "$REF" \
            -f attempt="$(( ATTEMPT + 1 ))" \
            -f legs="$RETRYABLE"
