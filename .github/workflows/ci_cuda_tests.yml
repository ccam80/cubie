name: CUDA tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1,3,5"   # Mon/Wed/Fri 16:00 UTC
  push:
    branches: ["main"]
  # PRs opt in via a maintainer comment (see the `cuda` job `if`) rather
  # than running the paid GPU matrix on every PR.
  issue_comment:
    types: [created]

# Cancel superseded runs on the same PR/ref to avoid paying for stale jobs.
concurrency:
  group: cuda-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Trigger gating and commit pinning for the paid GPU matrix. Runs on
  # a free GitHub-hosted runner within seconds of the trigger: for
  # comment-triggered runs it records the PR head SHA that existed when
  # the maintainer approved, so the GPU job can refuse code pushed to
  # the PR between the approving comment and the minutes-later spot
  # instance launch. The cuda job inherits the gating through `needs`.
  gate:
    # Trigger on schedule/dispatch, on a push whose commit message opts
    # in, or when a maintainer comments `/test on cuda` on a PR. The
    # author_association gate stops external commenters from spending
    # GPU budget.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.issue.state == 'open' &&
       contains(github.event.comment.body, '/test on cuda') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      contains(github.event.head_commit.message, 'test_cuda') ||
      contains(github.event.head_commit.message, 'test_all')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      checkout-ref: ${{ steps.resolve.outputs.checkout-ref }}
      pr-head-sha: ${{ steps.resolve.outputs.pr-head-sha }}
    steps:
      # For comment-triggered runs the event ref is the default branch,
      # so the GPU job tests the PR's merge ref instead; record the PR
      # head underlying that merge ref right now, at approval time.
      - name: Resolve the commit this run tests
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "checkout-ref=refs/pull/${PR_NUMBER}/merge" >> "$GITHUB_OUTPUT"
            echo "pr-head-sha=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq .head.sha)" >> "$GITHUB_OUTPUT"
          else
            echo "checkout-ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr-head-sha=" >> "$GITHUB_OUTPUT"
          fi

  # Compile the test kernels on free CPU runners for every fleet GPU.
  precompile:
    needs: gate
    name: precompile (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.cuda }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: linux, python-version: "3.10", cuda: "12", extra: dev12}
          - {os: linux, python-version: "3.14", cuda: "12", extra: dev12}
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-latest' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.gate.outputs.checkout-ref }}
          persist-credentials: false

      - name: Verify the PR head matches the approved commit
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          approved="${{ needs.gate.outputs.pr-head-sha }}"
          actual=$(git cat-file -p HEAD | awk '$1 == "parent" { sha = $2 } END { print sha }')
          test -n "$approved" && test "$actual" = "$approved"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          cache-dependency-glob: pyproject.toml

      - name: Install cubie (${{ matrix.extra }})
        run: uv pip install --system -e ".[${{ matrix.extra }}]"

      - name: Freeze environment for the GPU leg
        shell: bash
        run: |
          mkdir -p kernel-cache
          uv pip freeze --system --exclude-editable > kernel-cache/constraints.txt

      - name: Precompile kernels per compute capability
        shell: bash
        env:
          CUBIE_KERNEL_CACHE_DIR: ${{ github.workspace }}/kernel-cache/kernels
          CUBIE_MAX_CACHE_ENTRIES: "0"
          # -p plugins are imported before pytest's pythonpath/conftest
          # machinery runs, and the pytest console script does not put
          # the cwd on sys.path, so the tests package must be exported
          # explicitly for `-p tests.precompile_plugin` to resolve.
          PYTHONPATH: ${{ github.workspace }}
          # Strip plain asserts (with rewriting off) so tests that
          # would fail on headless placeholder results keep running
          # and reach every kernel launch; test verdicts are
          # irrelevant here, only compile coverage matters.
          PYTHONOPTIMIZE: "1"
        run: |
          set -u
          for cc in 7.5 8.6 8.9; do
            echo "::group::precompile cc=$cc"
            set +e
            CUBIE_TARGET_CC="$cc" pytest \
              -m "not specific_algos and not sim_only" \
              -p tests.precompile_plugin -n logical \
              --assert=plain \
              --no-cov -q -p no:cacheprovider
            status=$?
            set -e
            if [ "$status" -gt 1 ]; then
              exit "$status"
            fi
            echo "::endgroup::"
          done

      - name: Upload kernel cache
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kernel-cache-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: kernel-cache

  cuda:
    needs: [gate, precompile]
    name: cuda (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.cuda }})
    permissions:
      contents: read
    # Runners are spot-only (ap-southeast-2 has zero On-Demand G/VT
    # quota, not grantable here) and the "All G and VT Spot" quota is
    # a fixed 8 vCPU. A leg gets a 2xlarge (8 vCPU) when that capacity
    # exists and an xlarge (4 vCPU) otherwise -- ap-southeast-2 is
    # structurally short of 2xlarge GPU spot (placement score 1/10 vs
    # 9/10 for xlarge), so xlarge is what usually runs, and two xlarge
    # legs fit the quota concurrently: max-parallel: 2. The fleet
    # runners (infra/fleet) are RunsOn *scale sets*: GitHub assigns at
    # most two jobs at a time and instances launch per assigned job,
    # so runner demand tracks max-parallel and never exceeds the
    # quota. If a leg does land a 2xlarge, the other
    # slot's launch is quota-blocked until it finishes; the fleet
    # retries with backoff, so that costs latency, never a failed leg.
    # The param-set xdist grouping (tests/conftest.py +
    # --dist=loadgroup in addopts) keeps thread scaling near-linear
    # across however many workers `-n logical` resolves to.
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - {os: linux, python-version: "3.10", cuda: "12", extra: dev12, fleet: gpu-linux}
          - {os: linux, python-version: "3.14", cuda: "12", extra: dev12, fleet: gpu-linux}
    runs-on: runs-on/fleet=${{ matrix.fleet }}/env=production

    steps:
      # Third-party actions in this job are pinned to commit SHAs: it
      # runs on self-hosted AWS runners, so a hijacked action tag would
      # execute inside this AWS account.
      # The ref comes from the gate job: the PR merge ref for
      # comment-triggered runs, the pushed/scheduled SHA otherwise.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.gate.outputs.checkout-ref }}
          persist-credentials: false

      # refs/pull/N/merge is re-resolved at checkout time, minutes
      # after the approving comment (spot launch), so a push to the PR
      # in that window would otherwise swap in code no maintainer
      # looked at. The merge commit's second parent is the PR head;
      # compare it with the head the gate job recorded at approval
      # time. cat-file reads the parent list from the commit object
      # itself, which works on this shallow clone (rev-parse HEAD^2
      # would need the parent objects).
      - name: Verify the PR head matches the approved commit
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          approved="${{ needs.gate.outputs.pr-head-sha }}"
          actual=$(git cat-file -p HEAD | awk '$1 == "parent" { sha = $2 } END { print sha }')
          if [ -z "$approved" ] || [ "$actual" != "$approved" ]; then
            echo "PR head moved since the approving comment:" >&2
            echo "  approved ${approved:-<none>}, checked out ${actual}" >&2
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      # The Windows AMI bakes the multi-GPU GRID driver on whichever GPU
      # family the bake's spot request landed (packer/windows-gpu.pkr.hcl);
      # on the first boot atop a *different* family, Windows PnP binds the
      # driver to the new hardware ID asynchronously after boot, and the
      # runner can take the job before the bind completes. Poll for up to
      # 3 minutes (nudging a device rescan on Windows) before declaring
      # the GPU genuinely absent.
      - name: GPU sanity check
        shell: bash
        run: |
          for attempt in $(seq 1 36); do
            if nvidia-smi; then
              exit 0
            fi
            command -v pnputil.exe >/dev/null 2>&1 && pnputil.exe /scan-devices || true
            echo "nvidia-smi not ready (attempt ${attempt}/36); retrying in 5s"
            sleep 5
          done
          echo "GPU driver never became available" >&2
          exit 1

      # uv resolves and installs several times faster than pip, and its
      # wheel cache rides GitHub's actions/cache service, so the
      # multi-GB nvidia-*/cupy wheels download once per leg flavour,
      # not once per run.
      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          cache-dependency-glob: pyproject.toml

      - name: Download precompiled kernel cache
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: kernel-cache-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: kernel-cache

      - name: Install cubie (${{ matrix.extra }})
        shell: bash
        run: |
          uv pip install --system -e ".[${{ matrix.extra }}]" \
            -c kernel-cache/constraints.txt

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        # -n logical (CLI) overrides pyproject's desktop-safe -n8 so the
        # runner uses all its vCPUs; change the runner instance size freely
        # and this scales automatically. Coverage/XML report come from addopts.
        env:
          CUBIE_KERNEL_CACHE_DIR: ${{ github.workspace }}/kernel-cache/kernels
          CUBIE_MAX_CACHE_ENTRIES: "0"
          # Same as the precompile leg: -p plugin imports happen before
          # any pytest sys.path setup, so the repo root must be on
          # PYTHONPATH for `tests.precompile_plugin` to import.
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -m "not specific_algos and not sim_only" -p tests.precompile_plugin -n logical --junitxml=pytest-results.xml

      # The artifact service occasionally answers CreateArtifact with a
      # non-JSON error page and the action's five internal retries all
      # land inside the same brief outage (observed: a leg with 2914
      # passed tests went red on this alone). One tolerated attempt plus
      # an explicit retry keeps transient flakes green while a
      # persistent upload failure still fails the leg.
      - name: Upload pytest artefacts
        id: upload-artefacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: |
            pytest-results.xml
            coverage.xml
      - name: Upload pytest artefacts (retry)
        if: always() && steps.upload-artefacts.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          path: |
            pytest-results.xml
            coverage.xml
          overwrite: true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false

      # codecov-action uploads test results via report_type. A separate
      # step from the coverage upload because report_type is
      # single-valued (coverage vs test_results).
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          files: pytest-results.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}-cuda${{ matrix.cuda }}
          disable_search: true
          fail_ci_if_error: false
